spring:
  application:
    name: dogclient
  jmx:
    enabled: false
  mvc:
    problemdetails:
      enabled: true

server:
  port: 8081
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include:
          - "*"
    jmx:
      exposure:
        include:
          - "*"
  endpoint:
    env:
      show-values: always
